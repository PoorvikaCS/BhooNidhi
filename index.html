<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Products | BhooNidhi Agritech</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f4f6f5;
  border: 6px solid #1b5e20;
}
header {
  background: #1b5e20;
  color: #fff;
  padding: 25px;
  text-align: center;
  border-bottom: 4px solid #2e7d32;
}

.product-grid {
  max-width: 1200px;
  margin: 40px auto;
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 25px;
  border: 3px dashed #c8e6c9;
  border-radius: 20px;
}

.product-card {
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  transition: transform 0.35s ease, box-shadow 0.35s ease;
  border: 3px solid #e8f5e9;
}

.product-card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 20px 45px rgba(0,0,0,0.3);
  border-color: #2e7d32;
}

.product-card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 20px 45px rgba(0,0,0,0.3);
  border-color: #2e7d32;
}

.product-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.product-card:hover img {
  transform: scale(1.08);
}

.product-info {
  padding: 18px;
  text-align: center;
}

.product-info h3 {
  color: #2e7d32;
  margin-bottom: 12px;
}

.whatsapp-btn {
  display: inline-block;
  padding: 12px 26px;
  background: linear-gradient(135deg, #25D366, #1ebe5d);
  color: #fff;
  text-decoration: none;
  border-radius: 30px;
  font-weight: bold;
  transition: all 0.35s ease;
  box-shadow: 0 8px 18px rgba(0,0,0,0.25);
}

.whatsapp-btn:hover {
  transform: translateY(-4px) scale(1.08);
  box-shadow: 0 14px 30px rgba(0,0,0,0.4);
}

.whatsapp-btn:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<header>
  <h1>Our Products</h1>
  <p>Quality agricultural tools trusted by farmers</p>
</header>

<div class="product-grid" id="productGrid"></div>

<script>
// Backend-like Product Database
const WHATSAPP_NUMBER = "917892761297";

const productDB = [
  { name: 'Battery Knapsack Sprayer', img: 'battery sprayers.jpg' },
  { name: 'Brush Cutter', img: 'asset/products/brush-cutter.jpeg' },
  { name: 'Water Pump Set', img: 'water pumpsets.jpg' },
  { name: 'Fodder / Chaff Cutter Machine', img: 'chaff cutter.jpg' },
  { name: 'Milking Machine', img: 'milking machine.jpg' },
  { name: 'Mini Power Tiller / Weeder', img: 'power weeder.jpg' },
  { name: 'Agricultural Tarpauline Sheet', img: 'asset/products/tarpaline.jpeg' },
  { name: 'Cow Mats', img: 'cow mats.jpg' }
];

// Render Products
const grid = document.getElementById('productGrid');

productDB.forEach(p => {
  const wa = `https://wa.me/${WHATSAPP_NUMBER}?text=I am interested in ${p.name}`;
  grid.innerHTML += `
    <div class="product-card">
      <img src="${p.img}">
      <div class="product-info">
        <h3>${p.name}</h3>
        <a href="${wa}" target="_blank" class="whatsapp-btn">
          Enquire on WhatsApp
        </a>
      </div>
    </div>
  `;
});
</script>

</body>
</html>
