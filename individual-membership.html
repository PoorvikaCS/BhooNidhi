<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Individual Membership | BhooNidhi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f5;
  padding: 40px;
}
.container {
  max-width: 700px;
  margin: auto;
  background: #fff;
  padding: 35px;
  border-radius: 16px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}
h1 { color: #1b5e20; text-align: center; }
input, textarea {
  width: 100%;
  padding: 12px;
  margin: 12px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}
button {
  background: linear-gradient(135deg, #1b5e20, #43a047);
  color: #fff;
  border: none;
  padding: 14px;
  border-radius: 30px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="container">
  <h1>Individual Membership</h1>

  <form onsubmit="sendWhatsApp(event)">
    <input id="name" placeholder="Full Name" required>
    <input id="mobile" placeholder="Mobile Number" required>
    <input id="location" placeholder="Village / City" required>
    <textarea id="usage" placeholder="Type of Farming / Tool Usage"></textarea>

    <button type="submit">Send Request via WhatsApp</button>
  </form>
</div>

<script>
function sendWhatsApp(e) {
  e.preventDefault();

  const msg =
`Hello BhooNidhi,
I want Individual Membership.

Name: ${name.value}
Mobile: ${mobile.value}
Location: ${location.value}
Usage: ${usage.value}`;

  window.open(
    `https://wa.me/917892761297?text=${encodeURIComponent(msg)}`,
    "_blank"
  );
}
</script>
</body>
</html>
